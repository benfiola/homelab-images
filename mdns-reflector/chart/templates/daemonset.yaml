apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "mdns-reflector.name" . }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "mdns-reflector.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "mdns-reflector.name" . }}
    spec:
      hostNetwork: {{ .Values.daemonSet.hostNetwork }}
      containers:
        - args:
            - homelab-helper
            - mdns-reflector
          env:
            {{- if .Values.config.sourceInterfaces }}
            - name: SOURCE_INTERFACES
              value: {{ .Values.config.sourceInterfaces | quote }}
            {{- end }}
            {{- if .Values.config.destInterfaces }}
            - name: DEST_INTERFACES
              value: {{ .Values.config.destInterfaces | quote }}
            {{- end }}
            {{- if .Values.config.logFormat }}
            - name: LOG_FORMAT
              value: {{ .Values.config.logFormat }}
            {{- end }}
            {{- if .Values.config.logLevel }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel }}
            {{- end }}
          image: ghcr.io/benfiola/homelab-helper:{{ .Values.daemonSet.image.tag | default (trimPrefix "v" .Chart.Version) }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pgrep -f "homelab-helper mdns-reflector" > /dev/null
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          name: client
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pgrep -f "homelab-helper mdns-reflector" > /dev/null
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- if .Values.daemonSet.resources }}
          resources: {{ .Values.daemonSet.resources | toYaml | nindent 10 }}
          {{- end }}
          securityContext:
            seccompProfile:
              type: RuntimeDefault
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            runAsUser: 1000
            runAsNonRoot: true
            capabilities:
              add:
                - NET_RAW
              drop:
                - ALL
            privileged: false
      serviceAccountName: {{ include "mdns-reflector.serviceAccountName" . }}
