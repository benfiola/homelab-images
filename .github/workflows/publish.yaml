name: publish

on: [push]

permissions:
  contents: write
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.detect.outputs.components }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: detect
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            CHANGED=$(git diff --name-only HEAD~1...HEAD 2>/dev/null || git ls-tree -r --name-only HEAD)
          else
            CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null || echo "")
          fi
          COMPONENTS=$(echo "$CHANGED" | cut -d/ -f1 | sort -u | grep -v '^\.' | grep -v '^vendor' | grep -v '^$' | tr '\n' ',' | sed 's/,$//')
          echo "components=$COMPONENTS" >> $GITHUB_OUTPUT

  release:
    needs: detect-changes
    if: needs.detect-changes.outputs.components != ''
    strategy:
      matrix:
        component: ${{ fromJson(format('[{0}]', format('"{0}"', replace(needs.detect-changes.outputs.components, ',', '","')))) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-go@v4
        with:
          go-version: '1.25.8'

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: install tools
        run: make install-tools
        working-directory: ${{ matrix.component }}

      - name: determine version settings
        id: version-settings
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          BRANCH_NAME="$(echo "${BRANCH_NAME}" | sed 's/[^a-zA-Z0-9.-]/-/g')"

          if [[ "${BRANCH_NAME}" == "dev" ]]; then
            echo "rc=${{ github.run_number }}" >> $GITHUB_OUTPUT
          elif [[ "${BRANCH_NAME}" != "main" ]]; then
            echo "alpha=${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "metadata=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: get next version
        id: version
        run: |
          VERSION=$(make next-version \
            RC='${{ steps.version-settings.outputs.rc }}' \
            ALPHA='${{ steps.version-settings.outputs.alpha }}' \
            METADATA='${{ steps.version-settings.outputs.metadata }}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
        working-directory: ${{ matrix.component }}

      - name: create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag '${{ matrix.component }}/${{ steps.version.outputs.version }}'
          git push origin '${{ matrix.component }}/${{ steps.version.outputs.version }}'

      - name: pre-publish
        run: make pre-publish
        working-directory: ${{ matrix.component }}

      - name: publish
        run: make publish
        working-directory: ${{ matrix.component }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
