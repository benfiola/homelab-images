name: publish

on: [push]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.detect.outputs.components }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: detect
        run: |
          # Detect changed components
          CHANGED=$(git diff --name-only origin/main...HEAD | cut -d/ -f1 | sort -u)
          # Filter to actual component directories (exclude .github, vendor, etc.)
          COMPONENTS=$(echo "$CHANGED" | grep -v '^\.' | grep -v '^vendor' | tr '\n' ',' | sed 's/,$//')
          echo "components=$COMPONENTS" >> $GITHUB_OUTPUT

  release:
    needs: detect-changes
    if: needs.detect-changes.outputs.components != ''
    strategy:
      matrix:
        component: ${{ fromJson(format('[{0}]', format('"{0}"', replace(needs.detect-changes.outputs.components, ',', '","')))) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-go@v4
        with:
          go-version: '1.25.8'

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: install goreleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          install-only: true

      - name: release component
        run: |
          cd ${{ matrix.component }}
          goreleaser release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
